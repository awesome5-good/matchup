<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 매치업</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F46E5'/><text x='50%25' y='50%25' font-size='20' font-weight='900' font-family='Arial' fill='white' text-anchor='middle' dominant-baseline='central'>M</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: linear-gradient(135deg, #F8F7FF 0%, #EEF2FF 50%, #F0FDF4 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .login-wrap {
      width: 100%; max-width: 420px;
    }

    /* 로고 */
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 32px;
      text-decoration: none;
    }
    .logo-icon {
      width: 40px; height: 40px; background: #4F46E5; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 20px;
    }
    .logo-text { font-weight: 800; font-size: 20px; color: #111827; }
    .logo-badge {
      font-size: 10px; background: #EEF2FF; color: #4F46E5;
      padding: 2px 6px; border-radius: 4px; font-weight: 600;
    }

    /* 카드 */
    .login-card {
      background: white; border-radius: 20px; padding: 40px;
      box-shadow: 0 8px 40px rgba(79,70,229,0.12);
      border: 1px solid #E5E7EB;
    }

    .login-title {
      font-size: 22px; font-weight: 800; color: #111827;
      text-align: center; margin-bottom: 8px;
    }
    .login-sub {
      font-size: 14px; color: #6B7280; text-align: center;
      margin-bottom: 32px; line-height: 1.6;
    }

    /* 구글 버튼 */
    .btn-google {
      width: 100%; padding: 14px 20px;
      background: white; border: 1.5px solid #E5E7EB;
      border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font-size: 15px; font-weight: 600; color: #374151;
      font-family: inherit; transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn-google:hover {
      border-color: #4F46E5; background: #FAFAFE;
      box-shadow: 0 4px 16px rgba(79,70,229,0.15);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google svg { flex-shrink: 0; }

    /* 로딩 상태 */
    .btn-google.loading {
      opacity: 0.7; pointer-events: none;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: #9CA3AF; font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #E5E7EB;
    }

    /* 혜택 리스트 */
    .benefit-list {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px;
    }
    .benefit-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #6B7280;
    }
    .benefit-icon {
      width: 24px; height: 24px; background: #EEF2FF; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    /* 약관 */
    .login-terms {
      font-size: 12px; color: #9CA3AF; text-align: center;
      line-height: 1.6; margin-top: 20px;
    }
    .login-terms a { color: #6B7280; text-decoration: underline; }

    /* 에러 */
    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #DC2626;
      margin-bottom: 16px; display: none;
      text-align: center;
    }
    .error-box.show { display: block; }

    /* 성공 */
    .success-box {
      background: #F0FDF4; border: 1px solid #BBF7D0;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #15803D;
      margin-bottom: 16px; display: none;
      text-align: center;
    }
    .success-box.show { display: block; }

    /* 홈으로 */
    .back-home {
      text-align: center; margin-top: 24px;
    }
    .back-home a {
      font-size: 13px; color: #9CA3AF; text-decoration: none;
      transition: color 0.15s;
    }
    .back-home a:hover { color: #4F46E5; }

    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
      .login-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <!-- 로고 -->
  <a href="index.html" class="login-logo">
    <div class="logo-icon">M</div>
    <div class="logo-text">매치업</div>
    <div class="logo-badge">beta</div>
  </a>

  <!-- 카드 -->
  <div class="login-card">
    <div class="login-title">로그인 / 회원가입</div>
    <div class="login-sub">구글 계정으로 간편하게 시작하세요.<br>별도 회원가입 없이 바로 이용 가능합니다.</div>

    <!-- 에러/성공 메시지 -->
    <div class="error-box" id="error-box"></div>
    <div class="success-box" id="success-box"></div>

    <!-- 혜택 -->
    <div class="benefit-list">
      <div class="benefit-item">
        <div class="benefit-icon">💾</div>
        <span>매칭 결과가 자동으로 저장됩니다</span>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">📋</div>
        <span>기업 진단 리포트를 언제든 다시 확인</span>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">🔔</div>
        <span>새 지원사업 공고 알림 (준비 중)</span>
      </div>
    </div>

    <div class="divider">구글 계정으로 시작</div>

    <!-- 구글 로그인 버튼 -->
    <button class="btn-google" id="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>

    <div class="login-terms">
      로그인 시 매치업의 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에<br>동의하는 것으로 간주됩니다.
    </div>
  </div>

  <div class="back-home">
    <a href="index.html">← 홈으로 돌아가기</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wykupodtnbcrebgbzyxr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_THekjy2-GusHmZ7FrjX9UQ_gm41EUr2';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // 이미 로그인된 경우 matchup.html로 이동
  async function checkSession() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      window.location.href = 'matchup.html';
    }
  }
  checkSession();

  // 구글 로그인
  async function loginWithGoogle() {
  const ua = navigator.userAgent.toLowerCase();
  const isInApp = /kakaotalk|line|naver|instagram|facebook|fbav/i.test(ua);
  if (isInApp) {
    if (/iphone|ipad|ipod/i.test(ua)) {
      window.location.href = 'x-safari-' + window.location.href;
    } else {
      window.location.href = 'intent://' + window.location.host + window.location.pathname +
        '#Intent;scheme=https;package=com.android.chrome;end';
    }
    return;
  }
  const btn = document.getElementById('btn-google');
  btn.classList.add('loading');
  btn.textContent = '로그인 중...';
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/matchup.html'
    }
  });

    if (error) {
      showError('로그인 중 오류가 발생했습니다. 다시 시도해주세요.');
      btn.classList.remove('loading');
      btn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 계속하기`;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
